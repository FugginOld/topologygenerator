<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>homelab · topology</title>
<style>
  :root{--bg0:#04070f;--line:#173553;--hud:#63d0ff;--hud-dim:#2d5f7e;--ink:#a6d9ef;
    --ok:#46e0a4;--warn:#ffc451;--crit:#ff5f6d;--ts:#8b7bff;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(ellipse at 50% -15%,#0a1d33 0%,var(--bg0) 60%),var(--bg0);
    color:var(--ink);font-family:"DejaVu Sans Mono","Consolas",monospace;overflow:hidden;}
  #frame{position:fixed;inset:12px;border:1px solid var(--line);border-radius:5px;pointer-events:none;z-index:5}
  header{position:fixed;top:24px;left:32px;right:32px;z-index:7;display:flex;justify-content:space-between;align-items:flex-start}
  header h1{font-size:15px;letter-spacing:.22em;color:var(--hud);text-shadow:0 0 12px rgba(99,208,255,.45)}
  header .tag{font-size:9.5px;color:var(--hud-dim);letter-spacing:.13em;margin-top:5px}
  header .rt{text-align:right;font-size:10px;color:var(--hud-dim);line-height:1.85}
  header .rt b{color:var(--ok)}
  #stage{position:fixed;inset:66px 32px 30px;z-index:4}
  svg{width:100%;height:100%;overflow:visible}
  #ctrl{position:fixed;bottom:26px;left:32px;z-index:8;display:flex;gap:10px;align-items:center}
  .btn{border:1px solid var(--line);background:rgba(8,20,34,.85);color:var(--ink);
    font-family:inherit;font-size:9.5px;letter-spacing:.1em;padding:7px 12px;border-radius:4px;cursor:pointer}
  .btn.on{border-color:var(--ts);color:#b9aeff}
  #ctrl .note{font-size:9px;color:var(--hud-dim)}
  #err{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;
    color:var(--warn);font-size:13px;text-align:center;padding:40px;display:none}
</style>
</head>
<body>
<div id="frame"></div>
<header>
  <div><h1>H O M E L A B &nbsp; T O P O L O G Y</h1>
    <div class="tag" id="tag">loading topology.json …</div></div>
  <div class="rt">HOSTS <b id="hosts">0</b> online<br>VLANS <b id="vlans">0</b><br>
    UPDATED <b id="gen">—</b></div>
</header>
<div id="stage"><svg id="svg" viewBox="0 0 1400 840"></svg></div>
<div id="ctrl">
  <button class="btn" id="tsBtn">◇ TAILSCALE OVERLAY</button>
  <button class="btn on" id="flowBtn">≈ FLOW: ON</button>
  <button class="btn" id="reloadBtn">⟳ RELOAD</button>
  <span class="note">reads topology.json · click device to isolate · auto-refresh 30s</span>
</div>
<div id="err"></div>

<script>
const svg=document.getElementById('svg');
const NS='http://www.w3.org/2000/svg';
const el=(t,a,x)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);if(x!=null)e.textContent=x;return e;};
const CLS={mgmt:'#63d0ff',lan:'#46e0a4',srv:'#ffc451',adsb:'#ff9d5c',iot:'#ff5f6d',guest:'#8b7bff',dmz:'#ff9d5c',unknown:'#8899aa'};

let TOPO=null, tsOn=false, flowOn=true, selected=null, dash=0;

async function load(){
  try{
    const r=await fetch('topology.json?_='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    TOPO=await r.json();
    document.getElementById('err').style.display='none';
    prep();
  }catch(e){
    const err=document.getElementById('err');
    err.style.display='flex';
    err.innerHTML='could not load topology.json<br><br>run <code>python make_topology.py</code> '+
      'then serve this folder:<br><code>python renderers/html/serve.py</code><br><br>('+e.message+')';
  }
}

const WAN={x:170,y:70}, FW={x:700,y:70}, SW={x:700,y:180};
const cols=[250,700,1150], rows=[300,600];
const zoneW=400, zoneHdr=52, devH=44, pad=14;

function prep(){
  const zones=(TOPO.zones||[]).slice();
  // group nodes by vlan
  const byV={};
  (TOPO.nodes||[]).forEach(n=>{(byV[n.vlan]=byV[n.vlan]||[]).push(n);});
  // build zone render objects (only zones that have nodes, plus any defined)
  const vids=new Set(zones.map(z=>z.vid));
  Object.keys(byV).forEach(v=>{ if(v!=='null'&&!vids.has(+v)){ zones.push({vid:+v,name:'VLAN'+v,subnet:'',policy:'',cls:'unknown'});}});
  ZONES=zones.filter(z=>byV[z.vid]&&byV[z.vid].length).slice(0,6);
  ZONES.forEach((z,i)=>{
    z.cx=cols[i%3]; z.top=rows[Math.floor(i/3)]; z.x=z.cx-zoneW/2;
    z.dev=byV[z.vid]||[];
    const rowsN=Math.max(1,Math.ceil(z.dev.length/2));
    z.h=zoneHdr+rowsN*(devH+10)+pad;
    z.dev.forEach((d,j)=>{
      const c=j%2,r=Math.floor(j/2);
      d._w=(zoneW-pad*3)/2; d._x=z.x+pad+c*(d._w+pad); d._y=z.top+zoneHdr+r*(devH+10);
      d._cls=z.cls; d._cx=d._x+d._w/2; d._cy=d._y+devH/2;
      d._load=0.1+Math.random()*0.4;
    });
  });
  ALLDEV=ZONES.flatMap(z=>z.dev);
  document.getElementById('tag').textContent=(TOPO.nodes||[]).length+' nodes · '+ZONES.length+' VLANs · L3 core';
  document.getElementById('hosts').textContent=(TOPO.nodes||[]).filter(n=>n.online).length;
  document.getElementById('vlans').textContent=ZONES.length;
  document.getElementById('gen').textContent=(TOPO.generated||'—').replace('T',' ').slice(0,16);
}
let ZONES=[], ALLDEV=[];

function draw(){
  if(!TOPO){return;}
  svg.innerHTML='';
  const defs=el('defs');
  defs.innerHTML='<filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
  svg.appendChild(defs);

  spineLink(WAN.x+46,WAN.y,FW.x-64,FW.y,'#63d0ff',0.5);
  spineLink(FW.x,FW.y+22,SW.x,SW.y-20,'#63d0ff',0.6);
  ZONES.forEach(z=>spineLink(SW.x,SW.y+20,z.cx,z.top-2,CLS[z.cls]||'#8899aa',z._tl||0.3));

  ZONES.forEach(z=>{
    const col=CLS[z.cls]||'#8899aa';
    const g=el('g');
    g.appendChild(el('rect',{x:z.x,y:z.top,width:zoneW,height:z.h,rx:6,fill:'rgba(8,20,34,.55)',stroke:col,'stroke-width':1,'stroke-dasharray':'2 3',opacity:.9}));
    g.appendChild(el('rect',{x:z.x,y:z.top,width:zoneW,height:34,rx:6,fill:col,opacity:.14}));
    g.appendChild(el('rect',{x:z.x,y:z.top,width:4,height:z.h,fill:col}));
    g.appendChild(el('text',{x:z.x+16,y:z.top+21,'font-size':13,fill:col},`VLAN ${z.vid} · ${z.name}`));
    if(z.subnet)g.appendChild(el('text',{x:z.x+zoneW-14,y:z.top+15,'font-size':8.5,fill:'#2d5f7e','text-anchor':'end'},z.subnet));
    if(z.policy)g.appendChild(el('text',{x:z.x+zoneW-14,y:z.top+27,'font-size':8.5,fill:col,'text-anchor':'end',opacity:.8},'▸ '+z.policy));
    svg.appendChild(g);

    z.dev.forEach(d=>{
      const dim=selected&&selected!==d&&!(tsOn&&(d.tags||[]).includes('ts')&&(selected.tags||[]).includes('ts'))?.28:1;
      const col2=d.online?col:'#3a4a5a';
      const gg=el('g',{opacity:dim,style:'cursor:pointer'});
      gg.appendChild(el('rect',{x:d._x,y:d._y,width:d._w,height:devH,rx:4,fill:'rgba(6,16,28,.92)',stroke:col2,'stroke-width':1}));
      gg.appendChild(el('rect',{x:d._x,y:d._y,width:3,height:devH,fill:col2}));
      const led=el('circle',{cx:d._x+d._w-11,cy:d._y+12,r:3.4,fill:d.online?col:'#ff5f6d',filter:'url(#g)'});
      if(!d.online)led.appendChild(el('animate',{attributeName:'opacity',values:'1;.2;1',dur:'1s',repeatCount:'indefinite'}));
      gg.appendChild(led);
      gg.appendChild(el('text',{x:d._x+11,y:d._y+18,'font-size':11,fill:d.online?'#cdeaf7':'#5a6a7a'},d.name));
      gg.appendChild(el('text',{x:d._x+11,y:d._y+31,'font-size':8,fill:'#2d5f7e'},d.vendor||d.kind||d.ip||''));
      const bx=d._x+11,by=d._y+devH-7,bw=d._w*0.5;
      gg.appendChild(el('rect',{x:bx,y:by,width:bw,height:3,rx:1.5,fill:'rgba(45,95,126,.4)'}));
      if(d.online)gg.appendChild(el('rect',{x:bx,y:by,width:bw*d._load,height:3,rx:1.5,fill:col}));
      if((d.tags||[]).includes('ts'))gg.appendChild(el('text',{x:d._x+d._w-11,y:d._y+devH-8,'font-size':8,fill:tsOn?'#b9aeff':'#4a4a6a','text-anchor':'end'},'◇ts'));
      gg.addEventListener('click',e=>{e.stopPropagation();selected=selected===d?null:d;draw();});
      svg.appendChild(gg);
    });
  });

  cloud(WAN.x,WAN.y);
  chip(FW.x,FW.y,150,44,'firewall','L3 core','#63d0ff',true);
  chip(SW.x,SW.y,150,40,'core switch','802.1Q trunk','#63d0ff',false);

  if(tsOn){
    const ts=ALLDEV.filter(d=>(d.tags||[]).includes('ts')&&d.online);
    for(let i=0;i<ts.length;i++)for(let j=i+1;j<ts.length;j++)
      svg.appendChild(el('path',{d:`M ${ts[i]._cx} ${ts[i]._cy} L ${ts[j]._cx} ${ts[j]._cy}`,fill:'none',stroke:'#8b7bff','stroke-width':1,'stroke-dasharray':'2 6','stroke-dashoffset':dash,opacity:.5,filter:'url(#g)'}));
    ts.forEach(d=>svg.appendChild(el('circle',{cx:d._cx,cy:d._cy,r:5,fill:'none',stroke:'#8b7bff','stroke-width':1.2,opacity:.7})));
  }

  function spineLink(x1,y1,x2,y2,col,load){
    const d=`M ${x1} ${y1} C ${x1} ${(y1+y2)/2}, ${x2} ${(y1+y2)/2}, ${x2} ${y2}`;
    svg.appendChild(el('path',{d,fill:'none',stroke:'#173553','stroke-width':1.4}));
    if(flowOn)svg.appendChild(el('path',{d,fill:'none',stroke:col,'stroke-width':1+load*3,'stroke-dasharray':'4 10','stroke-dashoffset':dash,'stroke-linecap':'round',opacity:.3+load*.5,filter:'url(#g)'}));
  }
  function chip(x,y,w,h,t1,t2,col,big){
    const g=el('g',{transform:`translate(${x-w/2},${y-h/2})`});
    g.appendChild(el('rect',{x:0,y:0,width:w,height:h,rx:4,fill:'rgba(8,20,34,.95)',stroke:col,'stroke-width':big?1.4:1,filter:'url(#g)'}));
    g.appendChild(el('rect',{x:0,y:0,width:4,height:h,fill:col}));
    g.appendChild(el('text',{x:12,y:h/2-2,'font-size':12.5,fill:'#cdeaf7'},t1));
    g.appendChild(el('text',{x:12,y:h/2+13,'font-size':8.2,fill:'#2d5f7e'},t2));
    svg.appendChild(g);
  }
  function cloud(x,y){
    const g=el('g');
    g.appendChild(el('ellipse',{cx:x,cy:y,rx:44,ry:24,fill:'rgba(8,20,34,.9)',stroke:'#2d5f7e','stroke-width':1.2}));
    g.appendChild(el('text',{x,y:y-2,'font-size':11,fill:'#63d0ff','text-anchor':'middle'},'WAN'));
    g.appendChild(el('text',{x,y:y+11,'font-size':8,fill:'#2d5f7e','text-anchor':'middle'},'uplink'));
    svg.appendChild(g);
  }
}

function anim(){
  dash-=1.4;
  ZONES.forEach(z=>{z._tl=(z._tl||0.3)+(Math.random()-.5)*.1;z._tl=Math.max(.05,Math.min(1,z._tl));
    z.dev.forEach(d=>{if(d.online){d._load+=(Math.random()-.5)*.15;d._load=Math.max(.02,Math.min(1,d._load));}});});
  draw();
  requestAnimationFrame(anim);
}

document.getElementById('tsBtn').addEventListener('click',e=>{tsOn=!tsOn;e.target.classList.toggle('on',tsOn);});
document.getElementById('flowBtn').addEventListener('click',e=>{flowOn=!flowOn;e.target.classList.toggle('on',flowOn);e.target.textContent='≈ FLOW: '+(flowOn?'ON':'OFF');});
document.getElementById('reloadBtn').addEventListener('click',load);
svg.addEventListener('click',()=>{if(selected){selected=null;draw();}});

load();
setInterval(load,30000);
anim();
</script>
</body>
</html>
