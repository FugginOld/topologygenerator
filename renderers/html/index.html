<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topographer</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="favicon-16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<style>
  /* ---- SKINS: every color lives in a CSS var; the SVG/JS read these too (see refreshColors()).
         Flat themes only — solid panels, flat backgrounds, no glass/frost. A new skin = one
         body[data-theme=...] block below. Neutral Dark is the :root default. ---- */
  :root{--bg0:#15171c;--bg1:#15171c;--line:#2a2e38;--hud:#6f9bff;--hud-dim:#868c9b;--ink:#e8eaf0;
    --ok:#3ecf8e;--warn:#ffc451;--crit:#ff5f6d;--gen5:#3ad0b4;--gen4:#6f9bff;--gen3:#3ecf8e;--panel:#181b21;
    --glow:111,155,255;--down:#4a4f5a;--card-title:#e8eaf0;--card-fill:#1d2027;--card-fill-big:#1d2027;--bar-bg:#2a2e38;}
  body[data-theme="neutral-light"]{--bg0:#eef0f3;--bg1:#eef0f3;--line:#e5e7ec;--hud:#3b6ef5;--hud-dim:#767b86;--ink:#1a1c22;
    --ok:#22b36b;--warn:#b7791f;--crit:#c0392b;--gen5:#28c2a8;--gen4:#3b6ef5;--gen3:#22b36b;--panel:#ffffff;
    --glow:59,110,245;--down:#c0c5cd;--card-title:#1a1c22;--card-fill:#ffffff;--card-fill-big:#ffffff;--bar-bg:#e5e7ec;}
  body[data-theme="unraid-dark"]{--bg0:#191b1f;--bg1:#191b1f;--line:#333842;--hud:#ff8c2f;--hud-dim:#8b929c;--ink:#e7e9ec;
    --ok:#5cbf3a;--warn:#ffc451;--crit:#e22828;--gen5:#e22828;--gen4:#ff8c2f;--gen3:#5cbf3a;--panel:#202329;
    --glow:255,140,47;--down:#4a4f58;--card-title:#e7e9ec;--card-fill:#25282e;--card-fill-big:#25282e;--bar-bg:#333842;}
  body[data-theme="unraid-light"]{--bg0:#eceded;--bg1:#eceded;--line:#dcdfe2;--hud:#c25e12;--hud-dim:#788089;--ink:#20232a;
    --ok:#4ea72e;--warn:#b7791f;--crit:#e22828;--gen5:#e22828;--gen4:#ff8c2f;--gen3:#4ea72e;--panel:#f7f8f8;
    --glow:255,140,47;--down:#b6bcc2;--card-title:#20232a;--card-fill:#ffffff;--card-fill-big:#ffffff;--bar-bg:#dcdfe2;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(ellipse at 60% -20%,var(--bg1) 0%,var(--bg0) 62%),var(--bg0);
    color:var(--ink);font-family:"DejaVu Sans Mono","Consolas",monospace;overflow:hidden;display:flex;height:100vh;}

  /* SIDEBAR */
  #sidebar{flex:0 0 250px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel);z-index:8}
  #sidebar .head{padding:18px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
  #sidebar .head .brand{width:30px;height:30px;flex:0 0 auto;filter:drop-shadow(0 0 6px rgba(var(--glow),.35))}
  #sidebar .head .brand .ring{fill:none;stroke:var(--hud)}     /* contour rings follow the skin */
  #sidebar .head .brand .core{fill:#4CC6C6}                    /* teal core stays brand-constant */
  #sidebar .head h2{font-size:12px;letter-spacing:.24em;color:var(--hud);text-shadow:0 0 10px rgba(var(--glow),.4)}
  #sidebar .head .sub{font-size:8.5px;color:var(--hud-dim);letter-spacing:.12em;margin-top:5px}
  #addbtn,#netbtn{margin:12px 14px;padding:9px 8px;border:1px dashed var(--hud-dim);border-radius:4px;background:transparent;
    color:var(--hud);font-family:inherit;font-size:10px;letter-spacing:.1em;text-transform:uppercase;text-align:center;
    white-space:nowrap;cursor:pointer;transition:.15s;display:block;width:calc(100% - 28px)}
  #netbtn{margin-top:0}
  #addbtn:hover,#netbtn:hover{border-color:var(--hud);background:rgba(var(--glow),.08);box-shadow:0 0 14px rgba(var(--glow),.15)}
  #addbtn:disabled,#netbtn:disabled{opacity:.5;cursor:wait}
  #list{flex:1;overflow-y:auto;padding:0 10px}
  #list .empty{padding:20px 12px;font-size:9px;color:var(--hud-dim);letter-spacing:.08em;line-height:1.8;text-align:center}
  #list .empty code{color:var(--hud)}
  .item{position:relative;padding:11px 12px;margin:6px 0;border:1px solid var(--line);border-radius:4px;cursor:pointer;transition:.15s;background:var(--card-fill)}
  .item:hover{border-color:var(--hud-dim);background:rgba(var(--glow),.06)}
  .item.active{border-color:var(--hud);background:rgba(var(--glow),.1);box-shadow:inset 0 0 20px rgba(var(--glow),.08)}
  .item.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--hud);border-radius:4px 0 0 4px}
  .item .nm{font-size:11px;color:var(--card-title);letter-spacing:.03em}
  .item .ip{font-size:9px;color:var(--hud);letter-spacing:.04em;margin-top:3px;opacity:.8;font-variant-numeric:tabular-nums}
  .item .mt{font-size:8px;color:var(--hud-dim);letter-spacing:.06em;margin-top:4px}
  #list .section{font-size:8.5px;letter-spacing:.2em;color:var(--hud-dim);padding:12px 4px 4px;margin-top:4px}
  #list .section:first-child{margin-top:2px}
  .item .del{position:absolute;top:9px;right:9px;width:16px;height:16px;border:none;background:transparent;color:var(--hud-dim);cursor:pointer;font-size:13px;line-height:1;opacity:0;transition:.15s}
  .item:hover .del{opacity:1} .item .del:hover{color:var(--crit)}
  #sidebar .foot{padding:4px 16px 12px;font-size:8px;color:var(--hud-dim);letter-spacing:.1em;line-height:1.7}
  #skin{width:100%;padding:6px 8px;background:var(--panel);color:var(--hud);border:1px solid var(--line);border-radius:4px;
    font-family:inherit;font-size:9px;letter-spacing:.1em;cursor:pointer}
  #skin:hover{border-color:var(--hud)}

  /* MAIN */
  #main{flex:1;position:relative;overflow:hidden}
  #frame{position:absolute;inset:12px;border:1px solid var(--line);border-radius:5px;pointer-events:none;z-index:5;box-shadow:inset 0 0 70px rgba(var(--glow),.05)}
  .corner{position:absolute;width:20px;height:20px;border:2px solid var(--hud);opacity:.55;z-index:6;pointer-events:none}
  .corner.tl{top:11px;left:11px;border-right:none;border-bottom:none}
  .corner.br{bottom:11px;right:11px;border-left:none;border-top:none}
  header{position:absolute;top:26px;left:32px;right:32px;z-index:7;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none}
  header h1{font-size:15px;letter-spacing:.2em;color:var(--hud);text-shadow:0 0 12px rgba(var(--glow),.45)}
  header .tag{font-size:9.5px;color:var(--hud-dim);letter-spacing:.14em;margin-top:5px;max-width:560px;line-height:1.6}
  header .rt{text-align:right;font-size:10px;color:var(--hud-dim);letter-spacing:.1em;line-height:1.85}
  header .rt b{color:var(--ok)} header .rt b.warn{color:var(--warn)} header .rt b.crit{color:var(--crit)}
  #stage{position:absolute;inset:70px 32px 40px;z-index:4;cursor:grab}
  #stage.panning{cursor:grabbing}
  svg{width:100%;height:100%;overflow:visible;touch-action:none}
  text{font-family:"DejaVu Sans Mono",monospace;user-select:none}
  .card{cursor:move}
  #legend{padding:12px 16px 6px;border-top:1px solid var(--line);font-size:9px;color:var(--hud-dim);letter-spacing:.08em;line-height:2}
  #legend i{display:inline-block;width:16px;height:2px;vertical-align:middle;margin-right:8px}
  #err{position:absolute;inset:70px 32px 40px;display:none;align-items:center;justify-content:center;z-index:20;color:var(--warn);font-size:12px;text-align:center;padding:40px;line-height:1.9}
  #err code{color:var(--hud)}
  #zoom{position:absolute;right:30px;bottom:34px;z-index:8;display:flex;flex-direction:column;gap:6px}
  #zoom button{width:34px;height:34px;border:1px solid var(--line);border-radius:4px;background:var(--panel);color:var(--hud);font-family:inherit;font-size:15px;cursor:pointer;transition:.15s;line-height:1}
  #zoom button:hover{border-color:var(--hud);background:rgba(var(--glow),.1);box-shadow:0 0 12px rgba(var(--glow),.15)}
  #zoom button.fit{font-size:8.5px;letter-spacing:.06em}
  #zpct{position:absolute;left:32px;bottom:38px;z-index:8;font-size:9px;color:var(--hud-dim);letter-spacing:.1em}
  #ctxmenu{position:fixed;display:none;z-index:30;min-width:170px;background:var(--panel);border:1px solid var(--hud-dim);
    border-radius:5px;box-shadow:0 6px 24px rgba(0,0,0,.5);overflow:hidden}
  #ctxmenu .ch{padding:8px 12px 6px;font-size:8px;letter-spacing:.12em;color:var(--hud-dim);border-bottom:1px solid var(--line)}
  #ctxmenu .ci{padding:9px 12px;font-size:10px;letter-spacing:.06em;color:var(--hud);cursor:pointer;transition:.12s}
  #ctxmenu .ci:hover{background:rgba(var(--glow),.12)}
  #notice{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;background:rgba(2,6,12,.55)}
  #notice .nc-card{position:relative;max-width:430px;width:calc(100% - 60px);background:var(--card-fill-big);border:1px solid var(--hud);
    border-radius:8px;box-shadow:0 14px 44px rgba(0,0,0,.6);padding:20px 22px}
  #notice .nc-x{position:absolute;top:9px;right:12px;border:none;background:transparent;color:var(--hud-dim);font-size:18px;cursor:pointer;line-height:1}
  #notice .nc-x:hover{color:var(--hud)}
  #notice .nc-title{font-size:11.5px;letter-spacing:.14em;color:var(--hud);text-transform:uppercase;margin-bottom:12px;padding-right:22px;text-shadow:0 0 10px rgba(var(--glow),.4)}
  #notice .nc-body{font-size:11px;color:var(--ink);line-height:1.85;letter-spacing:.02em}
  #notice .nc-cmd{margin-top:9px;padding:9px 11px;background:rgba(var(--glow),.08);border:1px solid var(--line);border-radius:4px;
    color:var(--hud);font-size:10.5px;word-break:break-all;user-select:all}
  #notice.busy .nc-x{display:none}
  #notice .nc-actions{display:flex;gap:10px;margin-top:16px}
  #notice .nc-btn{flex:1;padding:9px;border:1px solid var(--line);border-radius:4px;background:var(--panel);color:var(--hud);font-family:inherit;font-size:10px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:.15s}
  #notice .nc-btn:hover{border-color:var(--hud);background:rgba(var(--glow),.1)}
  #notice .nc-btn.yes{border-color:var(--hud);background:rgba(var(--glow),.12)}

  /* VIEW TABS (per-topology: topology vs gateway dashboard) */
  #viewtabs{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:10;display:none;
    border:1px solid var(--line);border-radius:5px;overflow:hidden;background:var(--panel)}
  #viewtabs .vt{padding:7px 17px;border:none;background:transparent;color:var(--hud-dim);font-family:inherit;
    font-size:10px;letter-spacing:.14em;cursor:pointer;transition:.15s}
  #viewtabs .vt:hover{color:var(--hud)}
  #viewtabs .vt.active{background:rgba(var(--glow),.14);color:var(--hud)}
  #viewtabs .vt+.vt{border-left:1px solid var(--line)}

  /* GATEWAY DASHBOARD frame (shown when the DASHBOARD tab is active) */
  #dash{position:absolute;inset:70px 32px 40px;z-index:9;display:none;flex-direction:column;
    background:var(--panel);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  #main.dashview #dash{display:flex}
  #main.dashview #stage,#main.dashview #zoom,#main.dashview #zpct,#main.dashview header .rt{display:none}
  #dashbar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);
    font-size:10px;color:var(--hud-dim);letter-spacing:.06em}
  #dashtitle{color:var(--hud);letter-spacing:.14em}
  #dashupd{margin-left:auto;font-size:9px;color:var(--hud-dim);letter-spacing:.06em}
  #dashbar button{border:1px solid var(--line);border-radius:4px;background:transparent;color:var(--hud);
    font-family:inherit;font-size:9px;letter-spacing:.1em;padding:5px 10px;cursor:pointer;transition:.15s}
  #dashbar button:hover{border-color:var(--hud);background:rgba(var(--glow),.1)}
  #dashpanel{flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;align-content:start}
  .dcard{background:var(--card-fill);border:1px solid var(--line);border-radius:6px;padding:12px 13px;display:flex;flex-direction:column;gap:6px}
  .dcard.wide{grid-column:1/-1}
  .dcard .dl{font-size:9px;letter-spacing:.14em;color:var(--hud-dim);text-transform:uppercase}
  .dcard .dv{font-size:22px;font-weight:700;color:var(--card-title);letter-spacing:-.5px;line-height:1.1;font-variant-numeric:tabular-nums}
  .dcard .du{font-size:10px;color:var(--hud-dim)}
  .dcard .drow{display:flex;justify-content:space-between;gap:12px;font-size:10.5px;color:var(--ink);padding:4px 0;border-top:1px solid var(--line)}
  .dcard .dk{color:var(--hud-dim)}
  /* Homepage-style service tiles for containers */
  .svc{position:relative;display:flex;align-items:center;gap:10px;background:var(--card-fill);border:1px solid var(--line);
    border-radius:6px;padding:10px 11px;text-decoration:none;color:inherit;transition:border-color .12s,box-shadow .12s}
  a.svc:hover{border-color:var(--hud);box-shadow:0 0 14px rgba(var(--glow),.15)}
  .svc-ico{flex:0 0 auto;width:34px;height:34px;border-radius:7px;display:grid;place-items:center;font-size:13px;font-weight:700;
    color:var(--hud);background:rgba(var(--glow),.12);border:1px solid var(--line);text-transform:uppercase}
  .svc.down .svc-ico{color:var(--crit);background:transparent}
  .svc-main{min-width:0;flex:1;display:flex;flex-direction:column;gap:2px}
  .svc-name{font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .svc-sub{font-size:9px;color:var(--hud-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
  .svc-stat{font-size:8.5px;color:var(--hud);letter-spacing:.03em;font-variant-numeric:tabular-nums;opacity:.85}
  .svc-dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:#45c46b;box-shadow:0 0 8px rgba(69,196,107,.6)}
  .svc.down .svc-dot{background:var(--crit);box-shadow:none}
  .svc-group{grid-column:1/-1;display:flex;justify-content:space-between;align-items:baseline;font-size:9px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--hud-dim);margin:6px 2px -2px;padding-top:6px;border-top:1px solid var(--line)}
  .svc-group:first-of-type{border-top:0;padding-top:0}
  .dbadge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:9px;letter-spacing:.12em}
  .dbadge.ok{color:var(--ok);border:1px solid var(--ok)}
  .dbadge.bad{color:var(--crit);border:1px solid var(--crit)}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="head">
    <svg class="brand" viewBox="0 0 512 512" aria-hidden="true"><defs><path id="tb" d="M0,-50 C26,-49 49,-27 48,2 C47,29 25,49 -3,48 C-31,47 -49,26 -48,-4 C-47,-31 -27,-50 0,-50 Z"/></defs><use href="#tb" class="ring" transform="translate(256,256) scale(3.05)" style="stroke-width:7.5"/><use href="#tb" class="ring" transform="translate(268,262) scale(1.5)" style="stroke-width:15"/><circle class="core" cx="272" cy="266" r="52"/></svg>
    <div><h2>TOPOGRAPHER</h2><div class="sub">hardware &amp; network fabric maps</div></div>
  </div>
  <button id="addbtn">+ Generate Current Machine</button>
  <button id="netbtn">⊹ Scan Network</button>
  <div id="list"></div>
  <div id="legend">lane class
    <div><i style="background:var(--gen5)"></i>Gen5</div>
    <div><i style="background:var(--gen4)"></i>Gen4</div>
    <div><i style="background:var(--gen3)"></i>Gen3 / chipset</div></div>
  <div class="foot">
    <label for="skin" style="display:block;margin-bottom:5px">skin</label>
    <select id="skin">
      <option value="">neutral · dark</option>
      <option value="neutral-light">neutral · light</option>
      <option value="unraid-dark">unraid · dark</option>
      <option value="unraid-light">unraid · light</option>
    </select>
    <div style="margin-top:8px">drag module · scroll zoom · drag bg to pan</div>
  </div>
</aside>

<main id="main">
  <div id="frame"></div><div class="corner tl"></div><div class="corner br"></div>
  <header>
    <div><h1 id="title">—</h1><div class="tag" id="subtitle"></div></div>
    <div class="rt">STATE <b id="stat">NOMINAL</b><br>PORTS <b id="ports">0/0</b> up<br>NET <b id="net">0.0</b> Gb/s<br>STORAGE <b id="sto">0</b> MB/s<br>CPU <b id="pkg">0</b>%<b id="cputemp"></b></div>
  </header>
  <div id="viewtabs">
    <button id="tabTopo" class="vt active">TOPOLOGY</button>
    <button id="tabDash" class="vt">DASHBOARD</button>
  </div>
  <div id="stage"><svg id="svg"></svg></div>
  <div id="dash">
    <div id="dashbar">
      <span id="dashtitle">GATEWAY DASHBOARD</span>
      <span id="dashupd"></span>
      <button id="dashspeed" title="run a WAN speedtest (saturates the link briefly)">SPEEDTEST</button>
      <button id="dashrefresh" title="refresh now">REFRESH</button>
      <button id="dashopen" title="open the gateway's own UI in a new tab">OPEN UI ↗</button>
    </div>
    <div id="dashpanel"></div>
  </div>
  <div id="err"></div>
  <div id="ctxmenu"></div>
  <div id="notice"><div class="nc-card"><button class="nc-x" title="close">×</button><div class="nc-title"></div><div class="nc-body"></div></div></div>
  <div id="zpct">100%</div>
  <div id="zoom">
    <button id="zin" title="zoom in">+</button>
    <button id="zout" title="zoom out">−</button>
    <button id="zfit" class="fit" title="fit to window">FIT</button>
  </div>
</main>

<script>
const svg=document.getElementById('svg');
const NS='http://www.w3.org/2000/svg';
const el=(t,a,x)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);if(x!=null)e.textContent=x;return e;};
// colors come from the active skin's CSS vars — refreshed on theme switch so
// the SVG (which can't use var()) always matches the CSS-driven chrome.
const CLS={}, COL={};
function refreshColors(){
  const s=getComputedStyle(document.body), g=n=>s.getPropertyValue(n).trim();
  CLS.gen5=g('--gen5');CLS.gen4=g('--gen4');CLS.gen3=g('--gen3');
  // network zone classes (from make_network_topo zones) -> fixed bands, matches static_svg
  Object.assign(CLS,{mgmt:'#63d0ff',lan:'#46e0a4',srv:'#ffc451',adsb:'#ff9d5c',
    iot:'#ff5f6d',guest:'#8b7bff',dmz:'#ff9d5c',unknown:'#8899aa'});
  COL.line=g('--line');COL.hud=g('--hud');COL.dim=g('--hud-dim');
  COL.ok=g('--ok');COL.warn=g('--warn');COL.crit=g('--crit');COL.down=g('--down');
  COL.title=g('--card-title');COL.fill=g('--card-fill');COL.fillBig=g('--card-fill-big');COL.barBg=g('--bar-bg');
}
function setTheme(t){
  if(t) document.body.dataset.theme=t; else delete document.body.dataset.theme;
  try{ localStorage.setItem('skin',t||''); }catch(e){}
  refreshColors();
}
const SKINS=[...document.getElementById('skin').options].map(o=>o.value);
const wanted=location.hash.slice(1);   // deep-link a skin: dashboard/#unraid-dark
const stored=(()=>{try{return localStorage.getItem('skin')||'';}catch(e){return '';}})();
// validate both against the current skin list — a value saved from a retired skin falls back to default
setTheme(SKINS.includes(wanted)?wanted:(SKINS.includes(stored)?stored:''));
document.getElementById('skin').value=document.body.dataset.theme||'';
document.getElementById('skin').onchange=e=>setTheme(e.target.value);

let TOPO=null;                 // {name,generated,nodes:[...]}
const view={k:1,tx:0,ty:0};
let TOPOS=[], activeId=null, laidOut=false;

// ================= SIDEBAR =================
async function loadList(){
  try{ const r=await fetch('api/list?_='+Date.now()); TOPOS=r.ok?await r.json():[]; }
  catch(e){ TOPOS=[]; }
  renderList();
  if(!activeId && TOPOS.length) selectTopo(TOPOS[0].id);
  else if(!TOPOS.length){ TOPO=null; showErr('no topologies yet.<br><br>hit <b>GENERATE</b> to map this PC, or run<br><code>python scanners/make_pc_topo.py</code>'); }
}
function renderList(){
  const list=document.getElementById('list');list.innerHTML='';
  if(!TOPOS.length){ list.innerHTML='<div class="empty">no topologies yet.<br><br>hit GENERATE, or run<br><code>python scanners/make_pc_topo.py</code></div>'; return; }
  const item=t=>{
    const d=document.createElement('div');
    d.className='item'+(t.id===activeId?' active':'');
    const when=(t.generated||'').replace('T',' ').slice(0,16);
    const ip=t.ip?`<div class="ip">${t.ip}</div>`:'';
    d.innerHTML=`<button class="del" title="delete">×</button><div class="nm">${t.name||t.id}</div>${ip}<div class="mt">${t.modules||0} modules · ${when}</div>`;

// ================= LAYOUT (tree columns) =================
function layout(){
  if(!TOPO||laidOut)return;
  const nodes=TOPO.nodes, byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const depth=n=>{let d=0,c=n,g=0;while(c.parent&&byId[c.parent]&&g++<20){d++;c=byId[c.parent];}return d;};
  // children grouped under each parent, in node order
  const kids={}; nodes.forEach(n=>{ (kids[n.parent]=kids[n.parent]||[]).push(n); });
  // tidy tree: DFS gives each leaf a sequential slot; parents centre on their
  // children's span. A tree laid out this way is planar -> links never cross.
  const slotOf={}; let slot=0;
  (function dfs(n){
    if(!n||slotOf[n.id]!=null)return;
    const ch=kids[n.id]||[];
    if(!ch.length){ slotOf[n.id]=slot++; }
    else { ch.forEach(dfs); slotOf[n.id]=(slotOf[ch[0].id]+slotOf[ch[ch.length-1].id])/2; }
  })(nodes.find(n=>!n.parent));
  nodes.forEach(n=>{ if(slotOf[n.id]==null) slotOf[n.id]=slot++; });   // orphans, just in case
  // left-align each column at a shared x, and space columns by the widest card in the
  // column before them — so variable-width cards line up cleanly and never crowd the next
  // column. n.x is the card's LEFT edge (render/links/fit all treat it that way).
  const ROWH=48, GAP=90;
  nodes.forEach(n=>{ n.w=cardWidth(n); });
  const dep={}, colW={};
  nodes.forEach(n=>{ const d=depth(n); dep[n.id]=d; colW[d]=Math.max(colW[d]||CW_MIN,n.w); });
  const maxD=Math.max(0,...nodes.map(n=>dep[n.id]));
  const colX={}; let cx=0;
  for(let d=0; d<=maxD; d++){ colX[d]=cx; cx+=(colW[d]||CW_MIN)+GAP; }
  nodes.forEach(n=>{ n.x=colX[dep[n.id]]; n.y=slotOf[n.id]*ROWH; });
  laidOut=true;
}
function fit(){
  if(!TOPO)return;
  const b=document.getElementById('stage').getBoundingClientRect();
  const ys=TOPO.nodes.map(n=>n.y);
  const minx=Math.min(...TOPO.nodes.map(n=>n.x))-40,maxx=Math.max(...TOPO.nodes.map(n=>n.x+(n.w||160)))+40;
  const miny=Math.min(...ys)-40,maxy=Math.max(...ys)+40;
  const bw=maxx-minx,bh=maxy-miny;
  view.k=Math.min(b.width/bw,b.height/bh,1.6);
  view.tx=(b.width-bw*view.k)/2-minx*view.k; view.ty=(b.height-bh*view.k)/2-miny*view.k;
  applyView();
}
function applyView(){document.getElementById('zpct').textContent=Math.round(view.k*100)+'%';}
function tcol(t){return t>=64?COL.crit:t>=55?COL.warn:COL.ok;}

// card sizing: cards auto-expand to fit their label (capped so columns never collide), then
// compress text as a last resort so nothing spills past the edge — works whatever mono font
// the browser actually has. getComputedTextLength/textLength are in the card's own units.
const _mc=document.createElement('canvas').getContext('2d');
const measW=(s,px)=>{_mc.font=px+'px "DejaVu Sans Mono","Consolas",monospace';return _mc.measureText(String(s)).width;};
function fitText(t,maxW){const L=t.getComputedTextLength();if(L>maxW){t.setAttribute('textLength',Math.max(1,maxW).toFixed(1));t.setAttribute('lengthAdjust','spacingAndGlyphs');}}
const CW_MIN=160,CW_MAX=232;                 // 232 keeps ≥18px gap between 250px-spaced columns
function cardWidth(n){const fL=n.kind==='cpu'?12.5:10.5;
  const wl=11+measW(clip(n.label,28),fL)+22;          // label + room for the status LED
  const ws=11+measW(clip(n.sub||'',34),8.2)+46;       // sub + room for the right-side readout
  return Math.max(CW_MIN,Math.min(CW_MAX,Math.max(wl,ws)));}

// ================= RENDER =================
function render(){
  if(!TOPO){svg.innerHTML='';return;}
  const nodes=TOPO.nodes, byId=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const b=document.getElementById('stage').getBoundingClientRect();
  svg.setAttribute('viewBox',`0 0 ${b.width} ${b.height}`);
  svg.innerHTML='';
  const defs=el('defs');
  defs.innerHTML=`<filter id="g" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg.appendChild(defs);
  const world=el('g',{transform:`translate(${view.tx} ${view.ty}) scale(${view.k})`});
  svg.appendChild(world);
  if(snapGuide){                 // faint magnetic-alignment guides while dragging
    const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
    const x0=Math.min(...xs)-120,x1=Math.max(...xs)+120,y0=Math.min(...ys)-60,y1=Math.max(...ys)+60;
    if(snapGuide.y!=null)world.appendChild(el('line',{x1:x0,y1:snapGuide.y,x2:x1,y2:snapGuide.y,stroke:COL.hud,'stroke-width':0.6,'stroke-dasharray':'4 6',opacity:.4}));
    if(snapGuide.x!=null)world.appendChild(el('line',{x1:snapGuide.x,y1:y0,x2:snapGuide.x,y2:y1,stroke:COL.hud,'stroke-width':0.6,'stroke-dasharray':'4 6',opacity:.4}));
  }
  nodes.forEach(n=>{ n.w=cardWidth(n); });           // size cards first so links attach at their real edges
  nodes.forEach(n=>{ if(n.parent&&byId[n.parent]) drawLink(world,byId[n.parent],n,n.cls||'gen3',n.load,n.link); });
  const big=held||pinned;                            // hold-to-preview or click-to-pin
  nodes.forEach(n=>{ if(n.id!==big) card(world,n,n.kind==='cpu'); });
  if(big&&byId[big]) cardBig(world,byId[big],big===pinned);   // drawn last -> on top, enlarged
}
function drawLink(world,p,c,cls,load,label){
  load=load||.1; const px=p.x+(p.w||160), cx=c.x, midx=(px+cx)/2;   // parent right edge -> child left edge
  const d=`M ${px} ${p.y} C ${midx} ${p.y}, ${midx} ${c.y}, ${cx} ${c.y}`;
  world.appendChild(el('path',{d,fill:'none',stroke:COL.line,'stroke-width':1.2}));
  world.appendChild(el('path',{d,fill:'none',stroke:CLS[cls]||CLS.gen3,'stroke-width':1+load*2.6,
    'stroke-dasharray':'3 11','stroke-dashoffset':c.dash||0,'stroke-linecap':'round',opacity:0.3+load*0.55,filter:'url(#g)'}));
  if(label){ const ly=(p.y+c.y)/2-4;                 // midx = the link's real horizontal midpoint
    const t=el('text',{x:midx,y:ly,'font-size':7.5,fill:CLS[cls]||COL.hud,'text-anchor':'middle',opacity:.75,'letter-spacing':'.04em'},label);
    world.appendChild(t); }
}
function card(world,n,big){
  const w=n.w||160,h=big?42:38;
  const isPort=n.up!==undefined, down=n.up===false, meas=measured(n);
  const col=n.kind==='cpu'?COL.hud:(n.cls?CLS[n.cls]:COL.hud);   // colour = lane class (real), not temp
  const ledCol=isPort?(down?COL.down:COL.ok):col;
  const g=el('g',{class:'card',transform:`translate(${n.x} ${n.y-h/2})`,opacity:down?0.5:1}); g.dataset.id=n.id;
  world.appendChild(g);                    // attach now so fitText() can measure the text below
  g.appendChild(el('rect',{x:0,y:0,width:w,height:h,rx:3,fill:COL.fill,stroke:down?COL.down:col,'stroke-width':big?1.4:1,'stroke-dasharray':down?'3 3':'','filter':'url(#g)'}));
  g.appendChild(el('rect',{x:0,y:0,width:3.5,height:h,fill:down?COL.down:col}));
  const led=el('circle',{cx:w-10,cy:10,r:3.2,fill:ledCol,filter:'url(#g)'});
  if(isPort&&!down) led.appendChild(el('animate',{attributeName:'opacity',values:'1;.45;1',dur:'1.4s',repeatCount:'indefinite'}));
  g.appendChild(led);
  const lt=el('text',{x:11,y:big?17:16,'font-size':big?12.5:10.5,fill:down?COL.dim:COL.title,'letter-spacing':'.02em'},clip(n.label,28));
  g.appendChild(lt); fitText(lt,w-33);
  const st=el('text',{x:11,y:big?30:28,'font-size':8.2,fill:COL.dim},clip(n.sub||'',34));
  g.appendChild(st); fitText(st,w-57);
  // right-side readout: link state on ports, capacity% on disks, live util% on cpu/net
  const hasFill=n.fill!=null, val=hasFill?n.fill:(n.load||0);
  if(isPort) g.appendChild(el('text',{x:w-9,y:big?30:28,'font-size':8.5,fill:ledCol,'text-anchor':'end'},down?'DOWN':'UP'));
  else if(hasFill) g.appendChild(el('text',{x:w-9,y:big?30:28,'font-size':9,fill:col,'text-anchor':'end'},Math.round(n.fill*100)+'% full'));
  else if(meas) g.appendChild(el('text',{x:w-9,y:big?30:28,'font-size':9,fill:col,'text-anchor':'end'},Math.round((n.load||0)*100)+'%'));
  // bar: capacity for disks, live load for cpu/net
  if((meas||hasFill)&&!down){
    const bx=11,by=h-5,bw=w*0.4;
    g.appendChild(el('rect',{x:bx,y:by,width:bw,height:3,rx:1.5,fill:COL.barBg}));
    g.appendChild(el('rect',{x:bx,y:by,width:bw*Math.min(1,val),height:3,rx:1.5,fill:col}));
  }
}
function clip(s,n){s=String(s);return s.length>n?s.slice(0,n-1)+'…':s;}
// press-and-hold detail: every field the node carries, key/value rows
function details(n){
  const r=[];
  if(n.meta) for(const k in n.meta) r.push([k,n.meta[k]]);   // real per-device identity from PnP
  if(n.kind) r.push(['type',n.kind]);
  if(n.cls) r.push(['lane',n.cls.toUpperCase()]);
  if(n.link) r.push(['link',n.link]);
  if(n.cap) r.push(['bandwidth',n.cap+(n.grp==='net'?' Gb/s':' GB/s')]);
  if(n.grp) r.push(['group',n.grp]);
  if(n.up!==undefined) r.push(['port',n.up?'UP':'DOWN']);
  if(n.fill!=null&&!(n.meta&&'used'in n.meta)) r.push(['used',Math.round(n.fill*100)+'%']);
  else if(measured(n)) r.push(['live load',Math.round((n.load||0)*100)+'%']);
  return r;
}
function cardBig(world,n,pin){
  const rows=details(n), w=280, h=54+rows.length*15+(pin?15:0);
  const col=n.kind==='cpu'?COL.hud:(n.cls?CLS[n.cls]:COL.hud);
  const g=el('g',{class:'card',transform:`translate(${n.x} ${n.y-h/2})`}); g.dataset.id=n.id;
  world.appendChild(g);                    // attach now so fitText() can measure the text below
  g.appendChild(el('rect',{x:0,y:0,width:w,height:h,rx:4,fill:COL.fillBig,stroke:col,'stroke-width':1.6,filter:'url(#g)'}));
  g.appendChild(el('rect',{x:0,y:0,width:4,height:h,fill:col}));
  if(pin) g.appendChild(el('circle',{cx:w-11,cy:11,r:3,fill:col,filter:'url(#g)'}));   // pin dot
  const lt=el('text',{x:14,y:21,'font-size':12.5,fill:COL.title,'letter-spacing':'.02em'},clip(n.label,pin?37:40));
  g.appendChild(lt); fitText(lt,w-28);
  const st=el('text',{x:14,y:37,'font-size':8.5,fill:COL.dim},clip(n.sub||'',48));
  g.appendChild(st); fitText(st,w-28);
  let y=55;
  rows.forEach(([k,v])=>{
    g.appendChild(el('text',{x:14,y,'font-size':9,fill:COL.dim,'letter-spacing':'.06em'},k));
    const vt=el('text',{x:w-14,y,'font-size':9.5,fill:col,'text-anchor':'end'},String(v));
    g.appendChild(vt); fitText(vt,w-28-measW(k,9)-12);   // keep each value clear of its key
    y+=15;
  });
  if(pin) g.appendChild(el('text',{x:14,y,'font-size':7.5,fill:COL.dim,'letter-spacing':'.12em'},'PINNED · CLICK TO CLOSE'));
}

// ================= LIVE TELEMETRY (real) =================
let TELE={cpu:0,net_gbps:0,disk_mbps:0,nics:{}};
async function pollTele(){
  try{
    const q='api/telemetry?host='+encodeURIComponent(activeId||'')+'&_='+Date.now();
    const r=await fetch(q);
    if(r.ok){ TELE=await r.json(); if(TELE.error)console.warn('telemetry error:',TELE.error); }
    else console.warn('telemetry HTTP '+r.status+' — restart topo_server.py (stale server has no /api/telemetry route)');
  }catch(e){ console.warn('telemetry fetch failed:',e.message); }
}
const norm=s=>String(s).toLowerCase().replace(/\[r\]|\(r\)|\[tm\]|\(tm\)/g,'').replace(/[^a-z0-9]+/g,' ').trim();
function nicLoad(n){                       // real per-adapter Gb/s -> fraction of cap
  if(!TELE.nics)return 0;
  if(n.iface&&TELE.nics[n.iface]!=null) return Math.min(1,TELE.nics[n.iface]/(n.cap||1)); // linux: by iface
  const k=norm(n.label);                   // windows: by adapter description
  for(const name in TELE.nics){ const nn=norm(name);
    if(nn===k||nn.includes(k)||k.includes(nn)) return Math.min(1,TELE.nics[name]/(n.cap||1)); }
  return 0;
}
const measured=n=>n.kind==='cpu'||n.grp==='net'||n.grp==='disk';

// ================= ANIMATION =================
function tick(){
  if(TOPO){
    const nodes=TOPO.nodes;
    nodes.forEach(n=>{
      if(n.dash==null)n.dash=0;
      let load;                            // real where measurable, else gentle ambient shimmer
      if(n.kind==='cpu') load=(TELE.cpu||0)/100;
      else if(n.grp==='net') load=(n.up===false)?0:nicLoad(n);
      else if(n.grp==='disk') load=Math.min(1,(TELE.disk_mbps||0)/1000/(n.cap||7));
      else { n._ph=(n._ph||Math.random()*6.28)+0.02; load=0.05+0.03*Math.sin(n._ph); }
      n.load=load; n.dash-=1+load*4;
    });
    const pts=nodes.filter(n=>n.up!==undefined);
    document.getElementById('ports').textContent=pts.filter(n=>n.up).length+'/'+pts.length;
    document.getElementById('net').textContent=(TELE.net_gbps||0).toFixed(1);
    document.getElementById('sto').textContent=Math.round(TELE.disk_mbps||0);
    document.getElementById('pkg').textContent=Math.round(TELE.cpu||0);
    document.getElementById('cputemp').textContent=(TELE.cpu_temp>0)?' · '+Math.round(TELE.cpu_temp)+'°C':'';
    const c=TELE.cpu||0, st=document.getElementById('stat');
    if(TELE.stale){ st.textContent='OFFLINE'; st.className='warn'; }   // remote host not reporting telemetry
    else { st.textContent=c>=85?'SATURATED':c>=55?'BUSY':'NOMINAL'; st.className=c>=85?'crit':c>=55?'warn':''; }
    render();
  }
  requestAnimationFrame(tick);
}

// ================= PAN / ZOOM / DRAG =================
const stage=document.getElementById('stage');
let drag=null, held=null, pinned=null;   // held = pressed card (preview); pinned = click-toggled open
function screenPt(e){const r=stage.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}
stage.addEventListener('mousedown',e=>{
  if(e.button!==0) return;                 // left-button only; right-click = context menu
  const p=screenPt(e); const cardEl=e.target.closest('.card');
  if(cardEl&&TOPO){ const n=TOPO.nodes.find(x=>x.id===cardEl.dataset.id); held=n.id; drag={type:'node',n,sx:p.x,sy:p.y,ox:n.x,oy:n.y}; }
  else { drag={type:'pan',sx:p.x,sy:p.y,tx:view.tx,ty:view.ty}; stage.classList.add('panning'); }
});
// magnetic align: snap a dragged card to share a nearby card's row (y) / column (x)
let snapGuide=null;
function magnetize(n){
  const SNAP=16; let ny=null,dy=SNAP, nx=null,dx=SNAP;
  for(const m of TOPO.nodes){ if(m===n)continue;
    const ay=Math.abs(m.y-n.y); if(ay<dy){dy=ay;ny=m.y;}
    const ax=Math.abs(m.x-n.x); if(ax<dx){dx=ax;nx=m.x;}
  }
  if(ny!=null)n.y=ny; if(nx!=null)n.x=nx;
  snapGuide=(ny!=null||nx!=null)?{x:nx,y:ny}:null;
}
// on drop: if the card overlaps another, snap it into that card's column, stacked
// directly above or below (the side it came from), then step to the first free slot
function settle(n,startY){
  const ROWH=48, OVX=140, OVY=30;
  let t=null,best=1e9;
  for(const m of TOPO.nodes){ if(m===n)continue;
    const dx=Math.abs(m.x-n.x), dy=Math.abs(m.y-n.y);
    if(dx<OVX&&dy<OVY){ const d=dy*4+dx; if(d<best){best=d;t=m;} }
  }
  if(!t)return;
  n.x=t.x;                                   // lock to the overlapped card's column
  const dir=(startY<=t.y)?-1:1;              // came from above -> above, else below
  n.y=t.y+dir*ROWH;
  const taken=y=>TOPO.nodes.some(m=>m!==n&&Math.abs(m.x-n.x)<OVX&&Math.abs(m.y-y)<OVY);
  let guard=0; while(taken(n.y)&&guard++<60) n.y+=dir*ROWH;
}
window.addEventListener('mousemove',e=>{
  if(!drag)return; const p=screenPt(e);
  if(drag.type==='pan'){ view.tx=drag.tx+(p.x-drag.sx); view.ty=drag.ty+(p.y-drag.sy); }
  else{ drag.n.x=drag.ox+(p.x-drag.sx)/view.k; drag.n.y=drag.oy+(p.y-drag.sy)/view.k;
    if(Math.abs(p.x-drag.sx)+Math.abs(p.y-drag.sy)>4)drag.moved=true; magnetize(drag.n); }
});
window.addEventListener('mouseup',()=>{
  if(drag&&drag.type==='node'){
    if(drag.moved) settle(drag.n,drag.oy);
    else pinned=(pinned===drag.n.id)?null:drag.n.id;   // click (no drag) toggles pin
  }
  drag=null;held=null;snapGuide=null;stage.classList.remove('panning');   // release -> shrinks (unless pinned)
});
let wheelAcc=0;
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  // normalize across devices (lines/pages -> px), accumulate, then step ONCE
  // per notch. Reset on each step so a single free-spin burst can't stack.
  let d=e.deltaY;
  if(e.deltaMode===1) d*=16; else if(e.deltaMode===2) d*=stage.clientHeight;
  wheelAcc+=d;
  if(Math.abs(wheelAcc)<50) return;
  const zoomIn=wheelAcc<0; wheelAcc=0;
  const p=screenPt(e);
  const f=zoomIn?1.1:1/1.1; const nk=Math.max(0.25,Math.min(4,view.k*f)), r=nk/view.k;
  view.tx=p.x-(p.x-view.tx)*r; view.ty=p.y-(p.y-view.ty)*r; view.k=nk; applyView();
},{passive:false});
function zoomBtn(f){const b=stage.getBoundingClientRect(),cx=b.width/2,cy=b.height/2;
  const nk=Math.max(0.25,Math.min(4,view.k*f)),r=nk/view.k;
  view.tx=cx-(cx-view.tx)*r;view.ty=cy-(cy-view.ty)*r;view.k=nk;applyView();}
document.getElementById('zin').onclick=()=>zoomBtn(1.2);
document.getElementById('zout').onclick=()=>zoomBtn(1/1.2);
document.getElementById('zfit').onclick=fit;
window.addEventListener('resize',()=>{if(TOPO&&laidOut)fit();});

// ============ RIGHT-CLICK: open/generate a machine's topology ============
const ctx=document.getElementById('ctxmenu');
const hideCtx=()=>{ctx.style.display='none';};
document.addEventListener('click',hideCtx);       // left-click anywhere closes it
function findMachine(name,ip){
  const nm=(name||'').toLowerCase();
  return TOPOS.find(t=>t.kind!=='network' && (((t.name||'').toLowerCase()===nm) || (ip&&t.ip===ip)));
}
const notice=document.getElementById('notice');
function showNotice(title,bodyHtml,busy){
  notice.querySelector('.nc-title').textContent=title;
  notice.querySelector('.nc-body').innerHTML=bodyHtml;
  notice.classList.toggle('busy',!!busy);
  notice.style.display='flex';
}
let hostWatch=null;
function hideNotice(){notice.style.display='none';clearInterval(hostWatch);hostWatch=null;}
// poll the list; when the host starts reporting, open its map automatically
function watchForHost(name,ip){
  clearInterval(hostWatch); let tries=0;
  hostWatch=setInterval(async()=>{
    if(++tries>120){ clearInterval(hostWatch); return; }   // give up after ~6 min
    await loadList();
    const m=findMachine(name,ip);
    if(m){ hideNotice(); selectTopo(m.id); }
  },3000);
}
notice.querySelector('.nc-x').onclick=hideNotice;
notice.addEventListener('click',e=>{ if(e.target===notice&&!notice.classList.contains('busy'))hideNotice(); });
async function scanHost(name,ip){
  showNotice('Scanning '+name,`Contacting <b>${ip}</b> over SSH — this can take a few seconds…`,true);
  let data={};
  try{
    const r=await fetch('api/scan-host',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({host:ip,name})});
    data=await r.json();
    if(r.ok){ hideNotice(); await loadList(); selectTopo(data.id); return; }
  }catch(e){ data={error:e.message}; }
  // not scanned -> show how to add it. Use the server's LAN IP (our own URL may
  // be localhost, which is meaningless on the remote machine we're telling to report).
  const port=location.port||'8770';
  const srv=data.server_ip?`http://${data.server_ip}:${port}`:location.origin;
  // a passive network scan can't reliably tell the host's OS, so offer both and
  // let the user pick — bootstrap.{sh,ps1} are both served by this dashboard.
  const B=srv+'/bootstrap.sh', Bps=srv+'/bootstrap.ps1';
  const persistent=`curl -fsSL ${B} | TOPO_SERVER=${srv} bash`;
  const snapshot  =`curl -fsSL ${B} | TOPO_SERVER=${srv} TOPO_ONCE=1 bash`;
  const winCmd    =`$env:TOPO_SERVER="${srv}"; irm ${Bps} | iex`;
  const lbl=t=>`<div style="margin-top:14px;font-size:8.5px;letter-spacing:.14em;color:var(--hud-dim)">${t}</div>`;
  // only surface the server message when an SSH scan was actually attempted and
  // failed — when remote_scan is simply off, the manual add is the normal flow
  const why=(data.ssh_tried&&data.error)?` <span style="opacity:.6">(SSH scan failed: ${data.error})</span>`:'';
  showNotice("Add "+name,
    `<div><b style="color:var(--hud)">${name}</b> isn't reporting yet. Run the one for its OS:</div>`
    +lbl('LINUX · ALWAYS-ON · PERSISTENT SERVICE')+`<div class="nc-cmd">${persistent}</div>`
    +lbl('LINUX · LAPTOP / PC · ONE-TIME SNAPSHOT')+`<div class="nc-cmd">${snapshot}</div>`
    +lbl('WINDOWS · POWERSHELL (PERSISTENT TASK)')+`<div class="nc-cmd">${winCmd}</div>`
    +`<div style="margin-top:14px;color:var(--hud-dim)">Waiting for <b style="color:var(--hud)">${name}</b> to report — this opens its map automatically.${why}</div>`);
  watchForHost(name,ip);   // auto-advance when the machine starts reporting
}
stage.addEventListener('contextmenu',e=>{
  hideCtx();                                                // clear any open menu first
  const cardEl=e.target.closest('.card');
  if(!cardEl||!TOPO||activeId!=='network') return;         // native menu elsewhere
  const n=TOPO.nodes.find(x=>x.id===cardEl.dataset.id);
  if(!n) return;
  const ip=(n.meta&&n.meta.ip)||n.sub||'';
  if(!ip||['zone','wan','root','firewall'].includes(n.kind)) return;  // hosts only
  e.preventDefault();
  const existing=findMachine(n.label,ip);
  ctx.innerHTML=`<div class="ch">${(n.label||ip).toUpperCase()}</div>`;
  const add=(label,fn)=>{const d=document.createElement('div');d.className='ci';d.textContent=label;d.onclick=()=>{hideCtx();fn();};ctx.appendChild(d);};
  if(existing) add('Open hardware report',()=>selectTopo(existing.id));
  add(existing?'Re-scan over SSH':'Generate machine topology',()=>scanHost(n.label,ip));
  ctx.style.left=Math.min(e.clientX,innerWidth-190)+'px';
  ctx.style.top=Math.min(e.clientY,innerHeight-90)+'px';
  ctx.style.display='block';
});

// ================= BOOT =================
loadList();
setInterval(loadList,30000);
pollTele(); setInterval(pollTele,2500);   // real CPU/net/disk telemetry
tick();
</script>
</body>
