# ── topologygenerator config ───────────────────────────────────────────────
# Copy to config.yaml (which is gitignored) and fill in real values.
# NEVER commit config.yaml — it holds API keys and your network layout.

# Mark a node offline if not seen within this many minutes.
offline_after_minutes: 30

# ── VLAN zones ──────────────────────────────────────────────────────────────
# Leave this OFF when a gateway collector (unifi/opnsense) supplies your real
# VLANs — otherwise these placeholder subnets show up as phantom zones.
# Only fill it in for networks with no API source. cls drives the color band:
# mgmt|lan|srv|adsb|iot|guest|dmz
# static_zones:
#   - {vid: 30, name: SERVERS, subnet: 10.0.30.0/24, policy: "selective", cls: srv}

# ── collectors ──────────────────────────────────────────────────────────────
opnsense:
  enabled: false
  url: https://10.0.10.1
  key: "CHANGEME"
  secret: "CHANGEME"
  verify_tls: false
  zone_map:
    SERVERS: {cls: srv, policy: "selective"}
    IOT:     {cls: iot, policy: "no lateral"}

# arpscan: Linux-only (needs arp-scan/nmap + sudo). Redundant when unifi is on.
arpscan:
  enabled: false
  use_sudo: true
  subnets:
    - 10.0.30.0/24
  # interfaces: [eth0.10, eth0.30]   # alternative to subnets

# pingsweep: zero-install discovery (OS ping + arp cache). Use this instead of
# arpscan on Windows or anywhere without arp-scan/nmap/sudo.
pingsweep:
  enabled: false
  subnets:
    - 10.0.10.0/24
    - 10.0.30.0/24
  timeout_ms: 500
  workers: 64
  resolve: true

# unifi: pull VLANs + client/uplink topology from a UniFi gateway (UCG/UDM/UXG).
# This is the best source for a UniFi network — knows the real VLAN layout.
unifi:
  enabled: true
  url: https://192.168.1.1          # the gateway itself
  site: default
  verify_tls: false                 # gateways ship a self-signed cert
  api_key: "CHANGEME"               # Settings > Control Plane > Integrations > Create API Key
  # username: topology              # OR a local admin account instead of an API key
  # password: "CHANGEME"
  # zone_map: force a color band per network — keys are the EXACT UniFi network
  # names. Optional: names like "Servers"/"IoT" are auto-colored without this.
  # zone_map:
  #   IoT Devices: {cls: iot, policy: "no lateral"}

unifi_snmp:
  enabled: false
  switches:
    - {host: 10.0.10.2, community: public, version: 2c, name: core-sw01}

# remote_scan: lets the dashboard right-click a Linux host in the network map and
# build its hardware topology over SSH (needs key-based SSH + python3 on the host).
# If off, right-click still opens an existing report or shows the agent command.
remote_scan:
  enabled: false
  user: joe
  ssh_opts: "-o ConnectTimeout=8 -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
  python: python3

tailscale:
  enabled: false
  binary: tailscale

docker:
  enabled: false
  ssh_opts: "-o ConnectTimeout=8 -o BatchMode=yes"
  hosts:
    - {ssh: joe@10.0.30.10, name: fugginnas}
    - {ssh: joe@10.0.30.11, name: ollama-01}

dns:
  enabled: false
  hosts_files: [/etc/hosts]
  # pihole_url: http://10.0.10.5/admin
  # pihole_token: "CHANGEME"
